{% extends "base.html" %}
{% block title %}Config — Score Bot Admin{% endblock %}
{% block content %}
<h2>Configuration</h2>

{% if saved %}
<div class="flash">Settings saved.</div>
{% endif %}

<form method="post" action="/admin/config" style="display:flex;flex-direction:column;gap:24px;max-width:600px">

  <div class="card" style="padding:20px">
    <div style="font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px">Display</div>

    <div class="filter-group" style="margin-bottom:0">
      <label>Timezone</label>
      <select name="display_timezone" class="input" style="width:280px">
        {% for tz_value, tz_label in timezones %}
        <option value="{{ tz_value }}" {% if display_timezone == tz_value %}selected{% endif %}>{{ tz_label }} — {{ tz_value }}</option>
        {% endfor %}
      </select>
      <span style="font-size:12px;color:var(--text-subtle);margin-top:4px">Used when displaying log timestamps in the admin panel.</span>
    </div>
  </div>

  <div>
    <button type="submit" class="btn btn-primary">Save</button>
  </div>

</form>
{% endblock %}
