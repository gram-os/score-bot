<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Score Bot Admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script>
    (function () {
      var t = localStorage.getItem('sb-theme');
      var c = localStorage.getItem('sb-cb');
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      if (c === 'deuteranopia') document.documentElement.setAttribute('data-cb', 'deuteranopia');
    })();
  </script>
  <style>
    /* === SAKURA (default) === */
    :root {
      --bg: #fff5f8;
      --surface: #ffeef4;
      --border: #f4b8cf;
      --border-light: #fad4e4;
      --text: #3d1828;
      --text-muted: #8b3060;
      --text-subtle: #c490a8;
      --header-bg: #fce4ef;
      --th-bg: #ffe0ec;
      --th-hover: #ffd0e4;
      --th-text: #8b3060;
      --tr-hover: #fff5f9;
      --input-border: #e898b8;
      --page-bg: #ffeef4;
      --page-border: #f4b8cf;
      --page-text: #6b2444;
      --page-hover: #ffe0ec;

      --c-primary: #e0457a;
      --c-primary-hover: #c83468;
      --c-danger: #dc2626;
      --c-danger-hover: #b91c1c;
      --c-success: #059669;
      --c-success-hover: #047857;
      --c-disabled: #c4a0b4;
      --c-disabled-hover: #b08898;
      --c-secondary-bg: #ffe0ec;
      --c-secondary-hover: #ffd0e4;
      --c-secondary-text: #6b2444;
      --c-warning-bg: #fff8e6;
      --c-warning-border: #d97706;
      --c-warning-text: #92400e;

      --badge-wordle-bg: #ffd0e8;
      --badge-wordle-text: #6b1a38;
      --badge-glyph-bg: #bfdbfe;
      --badge-glyph-text: #1e3a5f;
      --badge-enclose-bg: #f3e8ff;
      --badge-enclose-text: #6b21a8;

      --flash-bg: #ffd0e8;
      --flash-text: #6b1a38;
      --flash-border: #f4b8cf;
      --flash-err-bg: #fee2e2;
      --flash-err-text: #991b1b;
      --flash-err-border: #fca5a5;

      --rank-1: #d97706;
      --rank-2: #64748b;
      --rank-3: #78350f;

      --parse-match-bg: #ffe8f2;
      --parse-match-border: #f4b8cf;

      --shadow: #e8a8c0;
    }

    /* === MIDNIGHT BLOOM (dark variant) === */
    [data-theme="light"] {
      --bg: #170a10;
      --surface: #22101a;
      --border: #6b2d50;
      --border-light: #3d1830;
      --text: #fde8f0;
      --text-muted: #d490b8;
      --text-subtle: #8b4060;
      --header-bg: #0f0609;
      --th-bg: #2c1425;
      --th-hover: #381c30;
      --th-text: #d490b8;
      --tr-hover: #1c0d16;
      --input-border: #7a3058;
      --page-bg: #22101a;
      --page-border: #6b2d50;
      --page-text: #e8b0d0;
      --page-hover: #2c1425;

      --c-primary: #f472b6;
      --c-primary-hover: #ec4899;
      --c-danger: #f87171;
      --c-danger-hover: #ef4444;
      --c-success: #34d399;
      --c-success-hover: #10b981;
      --c-disabled: #5c2a48;
      --c-disabled-hover: #4a1f38;
      --c-secondary-bg: #2c1425;
      --c-secondary-hover: #381c30;
      --c-secondary-text: #e8b0d0;
      --c-warning-bg: #1c1208;
      --c-warning-border: #92400e;
      --c-warning-text: #fbbf24;

      --badge-wordle-bg: #2c1425;
      --badge-wordle-text: #f4b8d8;
      --badge-glyph-bg: #0a1830;
      --badge-glyph-text: #7dd3fc;
      --badge-enclose-bg: #1c0c28;
      --badge-enclose-text: #d8b4fe;

      --flash-bg: #2c1425;
      --flash-text: #f4b8d8;
      --flash-border: #6b2d50;
      --flash-err-bg: #1a0810;
      --flash-err-text: #f87171;
      --flash-err-border: #7f1d1d;

      --rank-1: #fbbf24;
      --rank-2: #94a3b8;
      --rank-3: #c07040;

      --parse-match-bg: #200d1a;
      --parse-match-border: #6b2d50;

      --shadow: #0a0408;
    }

    /* === COLORBLIND (deuteranopia) — sakura default === */
    [data-cb="deuteranopia"] {
      --c-danger: #d55e00;
      --c-danger-hover: #b04c00;
      --c-success: #0072b2;
      --c-success-hover: #005a8e;
    }

    /* === COLORBLIND (deuteranopia) — midnight bloom dark === */
    [data-theme="light"][data-cb="deuteranopia"] {
      --c-danger: #ee7733;
      --c-danger-hover: #cc5511;
      --c-success: #56b4e9;
      --c-success-hover: #3498c7;
    }

    /* === BASE === */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
    }

    /* === HEADER === */
    header {
      background: var(--header-bg);
      color: #fff;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 2px solid var(--c-primary);
      min-height: 48px;
    }

    header h1 {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 10px;
      font-weight: 400;
      color: var(--c-primary);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    nav { display: flex; gap: 2px; flex: 1; }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 11px;
      padding: 4px 7px;
      border: 1px solid transparent;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    nav a:hover { color: var(--c-primary); border-color: var(--c-primary); }

    nav a.active {
      color: var(--c-primary);
      border-color: var(--c-primary);
    }

    nav a.active::before { content: "> "; }

    .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .theme-btn {
      background: transparent;
      border: 1px solid var(--c-primary);
      color: var(--c-primary);
      font-size: 9px;
      padding: 3px 7px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .theme-btn:hover { background: var(--c-primary); color: var(--header-bg); }
    .theme-btn.active { background: var(--c-primary); color: var(--header-bg); }

    .logout {
      color: var(--text-subtle);
      font-size: 10px;
      text-decoration: none;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .logout:hover { color: var(--c-primary); }

    /* === LAYOUT === */
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    h2 {
      font-size: 13px;
      margin-bottom: 16px;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      color: var(--c-primary);
      letter-spacing: 1px;
    }

    h3 {
      font-size: 12px;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    /* === FILTERS === */
    .filters {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 14px;
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      box-shadow: 3px 3px 0 var(--shadow);
    }

    .filter-group { display: flex; flex-direction: column; gap: 4px; }

    .filter-group label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-group input,
    .filter-group select {
      padding: 6px 10px;
      border: 2px solid var(--input-border);
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
    }

    .input {
      padding: 6px 10px;
      border: 2px solid var(--input-border);
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
    }

    textarea {
      padding: 6px 10px;
      border: 2px solid var(--input-border);
      font-size: 13px;
      font-family: monospace;
      background: var(--surface);
      color: var(--text);
      resize: vertical;
    }

    /* === BUTTONS — pixel style === */
    .btn {
      padding: 7px 14px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 3px 3px 0 var(--shadow);
    }

    .btn:hover { box-shadow: 1px 1px 0 var(--shadow); transform: translate(2px, 2px); }
    .btn:active { box-shadow: none; transform: translate(3px, 3px); }

    .btn-primary { background: var(--c-primary); color: var(--header-bg); border-color: var(--c-primary-hover); }
    .btn-primary:hover { background: var(--c-primary-hover); }
    .btn-danger { background: var(--c-danger); color: #fff; border-color: var(--c-danger-hover); }
    .btn-danger:hover { background: var(--c-danger-hover); }
    .btn-secondary { background: var(--c-secondary-bg); color: var(--c-secondary-text); border-color: var(--border); }
    .btn-secondary:hover { background: var(--c-secondary-hover); }

    /* === TABLES === */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: 4px 4px 0 var(--shadow);
    }

    th {
      background: var(--th-bg);
      text-align: left;
      padding: 10px 12px;
      font-size: 10px;
      font-weight: 600;
      color: var(--th-text);
      border-bottom: 2px solid var(--border);
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td { padding: 9px 12px; border-bottom: 1px solid var(--border-light); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--tr-hover); }

    /* === PAGINATION === */
    .pagination { display: flex; gap: 8px; align-items: center; margin-top: 16px; }

    .pagination a,
    .pagination span {
      padding: 5px 10px;
      border: 2px solid var(--page-border);
      font-size: 11px;
      text-decoration: none;
      color: var(--page-text);
      background: var(--page-bg);
      font-family: 'Courier New', monospace;
    }

    .pagination a:hover { background: var(--page-hover); }
    .pagination .current { background: var(--c-primary); color: var(--header-bg); border-color: var(--c-primary); }

    /* === EMPTY STATE === */
    .empty {
      padding: 32px;
      text-align: center;
      color: var(--text-subtle);
      background: var(--surface);
      border: 2px solid var(--border);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .empty::before { content: "> "; color: var(--c-primary); }

    /* === BADGES === */
    .badge {
      display: inline-block;
      padding: 2px 6px;
      font-size: 10px;
      font-weight: 600;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      background: var(--c-secondary-bg);
      color: var(--c-secondary-text);
    }

    .badge-wordle { background: var(--badge-wordle-bg); color: var(--badge-wordle-text); }
    .badge-glyph { background: var(--badge-glyph-bg); color: var(--badge-glyph-text); }
    .badge-enclose { background: var(--badge-enclose-bg); color: var(--badge-enclose-text); }
    .badge-connections { background: #1c1400; color: #f59e0b; }
    .badge-betweenle { background: #001c18; color: #2dd4bf; }
    .badge-time_guessr { background: #1c0c00; color: #fb923c; }
    .badge-quordle { background: #1c0018; color: #f472b6; }
    .badge-mini_crossword { background: #001c10; color: #86efac; }
    .badge-pokedoku { background: #1c0808; color: #fca5a5; }
    .badge-info { background: var(--badge-glyph-bg); color: var(--badge-glyph-text); }
    .badge-warning { background: var(--c-warning-bg); color: var(--c-warning-text); }
    .badge-error { background: var(--flash-err-bg); color: var(--flash-err-text); }

    /* === RANKS === */
    .rank-1 { color: var(--rank-1); font-weight: 700; }
    .rank-2 { color: var(--rank-2); font-weight: 600; }
    .rank-3 { color: var(--rank-3); font-weight: 600; }

    /* === FLASH MESSAGES === */
    .flash {
      background: var(--flash-bg);
      color: var(--flash-text);
      border: 2px solid var(--flash-border);
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .flash::before { content: "> "; font-family: 'Courier New', monospace; color: var(--c-primary); }
    .flash-error { background: var(--flash-err-bg); color: var(--flash-err-text); border-color: var(--flash-err-border); }

    /* === TOGGLE BUTTONS === */
    .toggle-on { background: var(--c-success); color: #fff; border-color: var(--c-success-hover); }
    .toggle-on:hover { background: var(--c-success-hover); }
    .toggle-off { background: var(--c-secondary-bg); color: var(--c-secondary-text); border-color: var(--border); }
    .toggle-off:hover { background: var(--c-secondary-hover); }

    /* === CARDS === */
    .card {
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: 3px 3px 0 var(--shadow);
    }

    .stat-card {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 14px 18px;
      min-width: 120px;
      box-shadow: 3px 3px 0 var(--shadow);
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-subtle);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      font-family: 'Courier New', monospace;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--c-primary);
    }

    /* === TEXT UTILITIES === */
    .text-muted { color: var(--text-muted); }
    .text-subtle { color: var(--text-subtle); }
    .text-link { color: var(--c-primary); }
    .text-success { color: var(--c-success); font-weight: 600; }
    .text-disabled { color: var(--c-disabled); font-weight: 600; }
    .text-danger { color: var(--c-danger); }

    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
    }

    .back-link::before { content: "< "; color: var(--c-primary); }
    .back-link:hover { color: var(--c-primary); }

    /* === SORTING === */
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: var(--th-hover); }
    .sort-icon { font-size: 9px; color: var(--text-subtle); margin-left: 3px; }

    /* === CHART GRID === */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* === HAMBURGER BUTTON — hidden on desktop === */
    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 22px;
      height: 16px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      margin-left: auto;
    }

    .nav-toggle span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--c-primary);
      transition: transform 0.15s, opacity 0.15s;
    }

    .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* === MOBILE === */
    @media (max-width: 768px) {
      header { flex-wrap: wrap; padding: 10px 16px; gap: 8px; align-items: center; min-height: auto; }
      header h1 { flex: 1; }
      .nav-toggle { display: flex; }
      .header-actions { order: 2; flex-shrink: 0; }

      nav {
        display: none;
        order: 3;
        flex-direction: column;
        width: 100%;
        flex: 0 0 100%;
        gap: 2px;
        padding: 8px 0 6px;
        border-top: 1px solid var(--border);
      }

      nav.open { display: flex; }
      nav a { padding: 8px 10px; font-size: 12px; border: none; }
      nav a:hover, nav a.active { background: rgba(224,69,122,0.12); }

      main { padding: 16px; }
      h2 { font-size: 11px; }

      /* Tables scroll horizontally; outline fills in since overflow:hidden conflicts with scrolling */
      table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border: none;
        outline: 2px solid var(--border);
        box-shadow: 2px 2px 0 var(--shadow);
      }

      .filters { flex-direction: column; align-items: stretch; }
      .filter-group { width: 100%; }
      .filter-group input, .filter-group select { width: 100%; box-sizing: border-box; }
      .filters input[style], .filters select[style] { width: 100% !important; }

      .stat-card { flex: 1 1 calc(50% - 6px); min-width: 0; }

      .btn { padding: 8px 14px; min-height: 36px; }
      .theme-btn { padding: 5px 8px; }

      .pagination { flex-wrap: wrap; }
      .chart-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .stat-card { flex: 1 1 100%; }
      td, th { padding: 7px 8px; }
    }

    /* === FLORAL ADORNMENTS === */
    h2::before {
      content: '✿';
      font-family: system-ui, sans-serif;
      font-size: 0.9em;
      margin-right: 10px;
      color: var(--c-primary);
      opacity: 0.7;
    }

    @keyframes petal-drift {
      0%   { transform: translateY(-20px) translateX(0) rotate(var(--rot-start, 0deg)); opacity: 0; }
      8%   { opacity: var(--petal-opacity, 0.45); }
      88%  { opacity: var(--petal-opacity, 0.45); }
      100% { transform: translateY(105vh) translateX(var(--drift-x, 40px)) rotate(var(--rot-end, 360deg)); opacity: 0; }
    }

    .petal {
      position: fixed;
      top: -20px;
      width: var(--size, 8px);
      height: calc(var(--size, 8px) * 1.5);
      background: var(--petal-color, #f9a8d4);
      border-radius: 50% 0 50% 0;
      pointer-events: none;
      z-index: 9999;
      animation: petal-drift var(--duration, 16s) ease-in var(--delay, 0s) infinite;
    }
  </style>
</head>
<body>
  <header>
    <h1>Score Bot</h1>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav id="mainNav">
      {% set _role = request.session.get('role', 'admin') %}
      {% if _role == 'admin' %}
      <a href="/admin/submissions" {% if active == 'submissions' %}class="active"{% endif %}>Submissions</a>
      <a href="/admin/live" {% if active == 'live' %}class="active"{% endif %}>Live</a>
      <a href="/admin/leaderboard" {% if active == 'leaderboard' %}class="active"{% endif %}>Leaderboard</a>
      <a href="/admin/stats" {% if active == 'stats' %}class="active"{% endif %}>Stats</a>
      <a href="/admin/games" {% if active == 'games' %}class="active"{% endif %}>Games</a>
      <a href="/admin/suggestions" {% if active == 'suggestions' %}class="active"{% endif %}>Suggestions</a>
      <a href="/admin/users" {% if active == 'users' %}class="active"{% endif %}>Users</a>
      <a href="/admin/tools" {% if active == 'tools' %}class="active"{% endif %}>Tools</a>
      <a href="/admin/monitoring" {% if active == 'monitoring' %}class="active"{% endif %}>Monitoring</a>
      <a href="/admin/system" {% if active == 'system' %}class="active"{% endif %}>System</a>
      {% endif %}
      <a href="/admin/homunculus" {% if active == 'homunculus' %}class="active"{% endif %}>Homunculus</a>
    </nav>
    <div class="header-actions">
      <button class="theme-btn" id="darkToggle" title="Toggle dark mode">Dark</button>
      <button class="theme-btn" id="cbToggle" title="Deuteranopia-friendly colors">CB</button>
      <a href="/auth/logout" class="logout">Logout</a>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  (function () {
    var html = document.documentElement;
    var darkBtn = document.getElementById('darkToggle');
    var cbBtn = document.getElementById('cbToggle');

    function syncButtons() {
      darkBtn.classList.toggle('active', html.getAttribute('data-theme') === 'light');
      cbBtn.classList.toggle('active', html.getAttribute('data-cb') === 'deuteranopia');
    }
    syncButtons();

    darkBtn.addEventListener('click', function () {
      if (html.getAttribute('data-theme') === 'light') {
        html.removeAttribute('data-theme');
        localStorage.removeItem('sb-theme');
      } else {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem('sb-theme', 'light');
      }
      syncButtons();
      document.dispatchEvent(new Event('themechange'));
    });

    cbBtn.addEventListener('click', function () {
      if (html.getAttribute('data-cb') === 'deuteranopia') {
        html.removeAttribute('data-cb');
        localStorage.removeItem('sb-cb');
      } else {
        html.setAttribute('data-cb', 'deuteranopia');
        localStorage.setItem('sb-cb', 'deuteranopia');
      }
      syncButtons();
      document.dispatchEvent(new Event('themechange'));
    });

    function cellText(row, idx) {
      return (row.cells[idx]?.innerText ?? '').trim();
    }

    function detectNumeric(rows, colIdx) {
      for (const row of rows) {
        const v = cellText(row, colIdx).replace(/[^0-9.\-]/g, '');
        if (v) return !isNaN(parseFloat(v));
      }
      return false;
    }

    function numVal(s) {
      return parseFloat(s.replace(/[^0-9.\-]/g, '')) || 0;
    }

    document.querySelectorAll('table').forEach(table => {
      const ths = Array.from(table.querySelectorAll('thead th'));

      ths.forEach((th, colIdx) => {
        if (!th.innerText.trim()) return;

        th.classList.add('sortable');

        th.addEventListener('click', () => {
          const tbody = table.querySelector('tbody');
          if (!tbody) return;

          const rows = Array.from(tbody.querySelectorAll('tr'));
          const prevDir = th.dataset.dir;

          ths.forEach(h => {
            delete h.dataset.dir;
            h.querySelector('.sort-icon')?.remove();
          });

          const asc = prevDir !== 'asc';
          th.dataset.dir = asc ? 'asc' : 'desc';

          const numeric = detectNumeric(rows, colIdx);

          rows.sort((a, b) => {
            const va = cellText(a, colIdx);
            const vb = cellText(b, colIdx);
            const cmp = numeric
              ? numVal(va) - numVal(vb)
              : va.localeCompare(vb, undefined, { sensitivity: 'base' });
            return asc ? cmp : -cmp;
          });

          rows.forEach(r => tbody.appendChild(r));

          const icon = document.createElement('span');
          icon.className = 'sort-icon';
          icon.textContent = asc ? ' ▲' : ' ▼';
          th.appendChild(icon);
        });
      });
    });
  })();

  (function () {
    var toggle = document.getElementById('navToggle');
    var nav = document.getElementById('mainNav');
    if (!toggle || !nav) return;
    toggle.addEventListener('click', function () {
      var isOpen = nav.classList.toggle('open');
      toggle.classList.toggle('open', isOpen);
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    nav.addEventListener('click', function (e) {
      if (e.target.tagName === 'A') {
        nav.classList.remove('open');
        toggle.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
  })();

  (function () {
    var colors = ['#f9a8d4','#fbcfe8','#fecdd3','#f4b8d0','#fda4af','#fce7f3'];
    for (var i = 0; i < 9; i++) {
      var p = document.createElement('div');
      p.className = 'petal';
      var size = 6 + Math.random() * 8;
      var duration = 14 + Math.random() * 14;
      var delay = Math.random() * 22;
      var driftX = (Math.random() - 0.5) * 100;
      var rotStart = Math.random() * 360;
      var rotEnd = rotStart + 200 + Math.random() * 300;
      var color = colors[Math.floor(Math.random() * colors.length)];
      p.style.cssText = [
        '--size:' + size + 'px',
        '--duration:' + duration + 's',
        '--delay:' + delay + 's',
        '--drift-x:' + driftX + 'px',
        '--rot-start:' + rotStart + 'deg',
        '--rot-end:' + rotEnd + 'deg',
        '--petal-color:' + color,
        '--petal-opacity:0.4',
        'left:' + (3 + Math.random() * 94) + '%',
      ].join(';');
      document.body.appendChild(p);
    }
  })();
  </script>
</body>
</html>
