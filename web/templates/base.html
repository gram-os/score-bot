<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Score Bot Admin{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 14px; color: #222; background: #f5f5f5; }
    header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 32px; }
    header h1 { font-size: 16px; font-weight: 600; }
    nav a { color: #ccc; text-decoration: none; font-size: 13px; padding: 4px 8px; border-radius: 4px; }
    nav a:hover, nav a.active { color: #fff; background: rgba(255,255,255,0.1); }
    nav { display: flex; gap: 4px; flex: 1; }
    .logout { color: #999; font-size: 12px; text-decoration: none; }
    .logout:hover { color: #fff; }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    h2 { font-size: 18px; margin-bottom: 16px; }
    .filters { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 12px; color: #666; font-weight: 500; }
    .filter-group input, .filter-group select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-primary:hover { background: #3a58e0; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-secondary { background: #eee; color: #444; }
    .btn-secondary:hover { background: #ddd; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
    th { background: #f0f0f0; text-align: left; padding: 10px 12px; font-size: 12px; font-weight: 600; color: #555; border-bottom: 1px solid #ddd; }
    td { padding: 9px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .pagination { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
    .pagination a, .pagination span { padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; text-decoration: none; color: #444; background: #fff; }
    .pagination a:hover { background: #f0f0f0; }
    .pagination .current { background: #4f6ef7; color: #fff; border-color: #4f6ef7; }
    .empty { padding: 32px; text-align: center; color: #999; background: #fff; border: 1px solid #ddd; border-radius: 6px; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-wordle { background: #e8f5e9; color: #2e7d32; }
    .badge-glyph { background: #e3f2fd; color: #1565c0; }
    .badge-enclose { background: #fff3e0; color: #e65100; }
    .rank-1 { color: #f59e0b; font-weight: 700; }
    .rank-2 { color: #6b7280; font-weight: 600; }
    .rank-3 { color: #92400e; font-weight: 600; }
    .flash { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 4px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; }
    .flash-error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    .toggle-on { background: #27ae60; color: #fff; }
    .toggle-on:hover { background: #219150; }
    .toggle-off { background: #95a5a6; color: #fff; }
    .toggle-off:hover { background: #7f8c8d; }
  </style>
</head>
<body>
  <header>
    <h1>Score Bot</h1>
    <nav>
      <a href="/admin/submissions" {% if active == 'submissions' %}class="active"{% endif %}>Submissions</a>
      <a href="/admin/leaderboard" {% if active == 'leaderboard' %}class="active"{% endif %}>Leaderboard</a>
      <a href="/admin/games" {% if active == 'games' %}class="active"{% endif %}>Games</a>
      <a href="/admin/stats" {% if active == 'stats' %}class="active"{% endif %}>Stats</a>
    </nav>
    <a href="/auth/logout" class="logout">Logout</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
