services:
  migrate:
    build: .
    command: alembic upgrade head
    restart: on-failure
    env_file: .env
    volumes:
      - ./data:/data

  bot:
    build: .
    command: python -m bot.main
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build: .
    command: uvicorn web.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
